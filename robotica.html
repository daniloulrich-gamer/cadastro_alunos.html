<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robotica e Automação - IFPR</title>
</head>

<body>

    <header>

        <section>

            <form action="" method="post" name="Cadastro Aluno" id="Cadastro Aluno">
                <label for="nome_aluno">Nome do Aluno</label> <br>
                <input type="text" name="nome_aluno" id="nome_aluno" size="50px">

                <br> <br>

                <label for="E-mail">E-mail Institucional</label> <br>
                <input type="text" name="E-mail" id="E-mail" size="50px">

                <br> <br>

                <label for="Curso">Curso</label> <br>
                <input type="text" name="Curso" id="Curso" size="50px">
                <br> <br>

                <label for="Série/Ano">Série/Ano</label> <br>
                <input type="text" name="Série/Ano" id="Série/Ano" size="50px">
                <br> <br>

                <input type="radio" name="genero" id="Olimpiada" value="Olimpiada"> Olimpíada
                <input type="radio" name="genero" id="Projeto" value="Projeto"> Projeto

                <br> <br>

                <label for="nome_time">Nome do Time</label> <br>
                <input type="text" name="nome_time" id="nome_time" size="50px">

                <br> <br>

                <label for="Quantidade_de_integrantes">Quantidade de integrantes:</label> <br>
                <input type="number" min="2" max="6" name="Quantidade_de_integrantes" id="Quantidade_de_integrantes"
                    size="10px">
                <br>

                <label for="Integrantes">Integrantes:</label> <br>
                <textarea id="Integrantes" rows="10" cols="35"></textarea>
                <br> <br>

                Necessita de algum equipamento especial? <br>
                <input type="radio" name="equipamento" id="sim" value="sim"> Sim <br>
                <input type="radio" name="equipamento" id="nao" value="nao"> Não

                <br> <br>

                <label for="Termos_de_servico">Por favor, aceite os termos de regulamento</label> <br>
                <input type="checkbox" name="Disciplinas" value="Aceito">Aceito <br>
                <input type="checkbox" name="Disciplinas" value="Recusar">Recusar (sair da página atual)

                <br> <br>

                Upload do projeto <br>

                <input type="file" name="projeto" value="projeto">

                <br> <br>

                <input type="submit" name="enviar" value="Enviar">
                <br>

                <input type="submit" name="Resetar" value="Resetar">

            </form>
        </section>

    </header>

    <br>
    
    <main>

        <a href="links.html">Links</a> <br>

    </main>

</body>

</html>
