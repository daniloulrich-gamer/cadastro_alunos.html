<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscrições</title>
</head>

<body>

    <header>

        <section>

            <form action="" method="post" name="Cadastro Aluno" id="Cadastro Aluno">
                <label for="nome_aluno">Nome do Aluno</label> <br>
                <input type="text" name="nome_aluno" id="nome_aluno" size="50px">
                <br> <br>
                <label for="E-mail">E-mail</label> <br>
                <input type="text" name="E-mail" id="E-mail" size="50px">
                <br> <br>

                <label for="Endereço">Endereço</label> <br>
                <input type="text" name="Endereço" id="Endereço" size="50px">
                <br> <br>

                <label for="CEP">CEP</label> <br>
                <input type="text" name="CEP" id="CEP" size="50px">
                <br> <br>

                <br> <br>

                <label for="Data_de_Nascimento">Data de Nascimento</label> <br>
                <input type="text" name="Data_de_Nascimento" id="Data_de_Nascimento" size="10px">
                <br> <br>

                <label for="">Em qual curso deseja matricular:</label>
                <select name="semestre" id="semestre">
                    <option value="Informatica">Informática</option>
                    <option value="Quimica">Química</option>
                    <option value="Fisica">Fisica</option>
                    <option value="Biologia">Biologia</option>
                </select>

                <br> <br>

                Em qual turno deseja matricular-se? <br>
                <input type="radio" name="turno" id="manha" value="manha"> Manhã <br>
                <input type="radio" name="turno" id="tarde" value="tarde"> Tarde <br>
                <input type="radio" name="turno" id="noite" value="noite"> Noite

                <br> <br>

                Já possui experiência na área? <br>
                <input type="radio" name="experiencia" id="sim" value="sim"> Sim <br>
                <input type="radio" name="experiencia" id="nao" value="nao"> Não <br>

                <br> <br>

                <label for="Interesses">Áreas de interesse</label> <br>
                <input type="checkbox" name="Disciplinas" value="Robotica_e_Automaçao">Robótica e Automação <br>
                <input type="checkbox" name="Disciplinas" value="Ciencias_da_Natureza">Ciências da Natureza <br>
                <input type="checkbox" name="Disciplinas" value="Engenharia">Engenharia

                <br> <br>

                <label for="observacoes">Observações</label> <br> <br>
                <textarea id="observacoes" rows="10" cols="35"></textarea>
                <br> <br>

                <br> <br>

                CPF e/ou RG <br>

                <input type="file" name="CPF e/ou RG" value="CPF e/ou RG">

                <br> <br>

                <input type="submit" name="enviar" value="Enviar">
                <br>

                <input type="submit" name="Resetar" value="Resetar">



            </form>
        </section>

    </header>

    <br>
    
    <main>

        <a href="links.html">Links</a> <br>

    </main>

</body>

</html>
