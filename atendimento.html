<!DOCTYPE html>
<html lang="PT-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
</head>

<body>

    <header>

        <section>

            <form action="" method="post" name="Atendimento ao cliente" id="Atendimento ao cliente">
                <label for="nome_cliente">Nome do Cliente</label> <br>
                <input type="text" name="nome_cliente" id="nome_cliente" size="50px">
                <br> <br>
                <label for="E-mail">E-mail</label> <br>
                <input type="text" name="E-mail" id="E-mail" size="50px">
                <br> <br>
                <label for="telefone_cliente">Telefone do Cliente</label> <br>
                <input type="text" name="telefone_cliente" id="telefone_cliente" size="50px">
                <br> <br>

                <br> <br>

                <label for="Termos_de_servico">Do que se trata sua mensagem ao suporte?</label> <br>
                <input type="checkbox" name="Escolha" value="duvida">Dúvida <br>
                <input type="checkbox" name="Escolha" value="reclamacao">Reclamação <br>
                <input type="checkbox" name="Escolha" value="sugestao">Sugestão

                <br> <br>

                Nível de urgência - <br>
                <input type="radio" name="urgencia" id="baixa" value="baixa"> Baixa
                <input type="radio" name="urgencia" id="média" value="média"> Média
                <input type="radio" name="urgencia" id="alta" value="alta"> Alta

                <br> <br>

                <label for="detalhe_seu_problema_aqui">Detalhe seu problema aqui!</label> <br> <br>
                <textarea id="observacoes" rows="10" cols="35"></textarea>
                <br> <br>

                <br> <br>

                <label for="Termos_de_servico">Por favor, aceite os termos de contato</label> <br>
                <input type="checkbox" name="Disciplinas" value="Aceito">Aceito <br>
                <input type="checkbox" name="Disciplinas" value="So_o_necessario">Só o necessário <br>
                <input type="checkbox" name="Disciplinas" value="Recusar">Recusar (sair da página de Suporte)

                <br> <br>
                <input type="submit" name="enviar" value="Enviar">
                <br>
                <input type="submit" name="Resetar" value="Resetar">

                <br> <br>

            </form>
        </section>

    </header>

    <main>

        <a href="links.html">Links</a> <br>

    </main>

</body>

</html>
